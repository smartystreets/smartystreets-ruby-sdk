name: Ruby Gem Publish

on:
  push:
    tags:
      - '**'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Publish
        run: |
          VERSION=${GITHUB_REF#refs/*/} make publish
        env:
          API_KEY: "${{ secrets.GEM_HOST_API_KEY }}"
